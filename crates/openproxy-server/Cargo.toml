[package]
name = "openproxy-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[[bin]]
name = "openproxy"
path = "src/main.rs"

[lib]
name = "openproxy_server"
path = "src/lib.rs"

[dependencies]
openproxy-core = { path = "../openproxy-core" }
tokio = { workspace = true }
axum = { workspace = true, features = ["ws"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
tokio-stream = { workspace = true }
http-body = "1.0"
http-body-util = "0.1"
bytes = "1"
parking_lot = { workspace = true }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
rusqlite = { workspace = true }
# `async_trait` is required by the Gate-C E2E test
# (`tests/e2e_models_discovery.rs`) for the in-file
# `TestMockAdapter` impl. Same rationale as the
# `tokio = { workspace = true, features = ["test-util"] }` in
# `openproxy-core` — a test-only ergonomic dep, not a runtime
# surface.
async-trait = { workspace = true }
# Used by the Gate-C E2E integration test
# (`tests/e2e_models_discovery.rs`) to get an isolated on-disk
# SQLite directory per test run. Pulls in a couple of `remove_*`
# helpers as a side effect — fine, this is a test-only dep.
tempfile = "3"
