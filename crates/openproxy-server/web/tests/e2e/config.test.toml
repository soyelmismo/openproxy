[server]
bind = "127.0.0.1:8790"
request_max_body_bytes = 10485760

[storage]
database_path = "crates/openproxy-server/web/tests/e2e/data-test.db"
encryption_key_source = "env"

[racing]
default_race_size = 1
max_race_size = 8
abort_grace_ms = 500

[timeouts]
connect_ms = 5000
request_send_ms = 10000
ttft_ms = 30000
idle_chunk_ms = 120000
total_ms = 300000

[retries]
max_attempts = 3
backoff_base_ms = 200
backoff_factor = 2
backoff_jitter_pct = 50

[circuit_breaker]
failure_threshold = 5
unhealthy_duration_ms = 60000

[logging]
format = "json"
level = "info"

[compression]
mode = "off"

[quota_protection]
enabled = true
threshold_percentage = 10
