packages:
  - "."

# pnpm 11.x workspace config. The `allowBuilds` map records which
# dependencies are permitted to run their install-time build scripts
# (postinstall, etc.). esbuild ships a platform-specific binary that
# its postinstall downloads; allowing it keeps `node build.mjs` working
# on fresh clones.
#
# Auto-generated by `pnpm install` on F6 (uPlot addition); the value
# was confirmed `true` because the baseline build already depended on
# esbuild and was working before F6.
allowBuilds:
  esbuild: true
