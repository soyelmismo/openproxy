# openproxy configuration example.
# Copy to `config.toml` and edit as needed. See docs/mvp-spec.md section 10.

[server]
bind = "127.0.0.1:8787"
request_max_body_bytes = 10485760

[storage]
database_path = "~/.openproxy/data.db"
encryption_key_source = "env"  # env | file

[racing]
default_race_size = 1
max_race_size = 8
abort_grace_ms = 500

[timeouts]
connect_ms = 5000
request_send_ms = 10000
ttft_ms = 30000
idle_chunk_ms = 120000
total_ms = 300000

[retries]
max_attempts = 3
backoff_base_ms = 200
backoff_factor = 2
backoff_jitter_pct = 50
# combo_max_attempts = 1  # Retry the entire combo walk when all targets fail (1 = off)

[circuit_breaker]
failure_threshold = 5
unhealthy_duration_ms = 60000

[logging]
format = "json"  # json | text
level = "info"

[compression]
# Modo de compresión: "off" | "lite" | "rtk"
#   off   → sin compresión
#   lite  → colapsa whitespace, dedup system prompts, trunca tool results,
#            remueve contenido redundante, reemplaza imágenes (zero semantic change, ~15% ahorro)
#   rtk   → filtra output de comandos CLI (git, cargo, npm, docker, etc.),
#            deduplica líneas repetidas, trunca inteligentemente (~60-90% en tool results)
mode = "off"

[quota_protection]
# Enable dynamic quota protection and load balancing/rotation.
# Default: true.
enabled = true

# Reserved quota threshold percentage (1-99). Accounts dropping below this
# will have those models marked as protected and avoided if other accounts
# have quota. Default: 10.
threshold_percentage = 10
